<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Proserpine — Profil</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="manifest" href="manifeste.json" />
    <meta name="theme-color" content="#071E12" />
  </head>
  <body>
    <div id="mobile-frame">
      <main id="app-content">
        <section id="view-profile" class="view active">
          <header class="app-header-dark profile-header-curved">
            <div class="header-content no-margin-bottom">
              <div>
                <p class="greeting">Gestion du compte</p>
                <h3 id="profile-name">Chargement...</h3>
              </div>
              <button class="icon-btn-square icon-btn-glass" id="logout-btn" aria-label="Déconnexion">
                <span class="material-symbols-rounded">logout</span>
              </button>
            </div>
          </header>

          <div class="settings-list">
            <a href="algorithme.html" class="setting-item">
              <span class="material-symbols-rounded">analytics</span>
              <span>Voir les détails de l'algorithme</span>
              <span class="material-symbols-rounded arrow">chevron_right</span>
            </a>
            <div class="setting-item">
              <span class="material-symbols-rounded">person_edit</span>
              <span>Modifier les informations personnelles</span>
              <span class="material-symbols-rounded arrow">chevron_right</span>
            </div>
          </div>
        </section>
      </main>

      <div id="navbar-placeholder"></div>
      <div id="toast-container" class="ui-layer" aria-live="assertive"></div>
    </div>

    <script type="module">
      import { uiManager } from './js/components/ui-manager.js';
      import './js/profil.js';
    </script>
  	<script type="module">import { uiManager } from './js/components/ui-manager.js';</script>
  </body>
</html>
