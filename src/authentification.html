<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Proserpine — Connexion</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="manifest" href="manifeste.json" />
    <meta name="theme-color" content="#071E12" />
  </head>
  <body>
    <div id="mobile-frame">
      <main id="app-content">
        <section id="view-auth" class="view active">
          <div class="auth-container">
            <div class="auth-logo">
              <span class="material-symbols-rounded">energy_savings_leaf</span>
            </div>
            <div class="auth-header">
              <h2 id="auth-title">Se connecter</h2>
              <p id="auth-subtitle">Content de vous revoir sur Proserpine</p>
            </div>

            <form id="auth-form" class="auth-form">
              <div class="input-group hidden" id="group-username">
                <label for="auth-username">Nom d'utilisateur</label>
                <input type="text" id="auth-username" placeholder="Pseudo" autocomplete="username">
              </div>
              <div class="input-group">
                <label for="auth-email">Email</label>
                <input type="email" id="auth-email" placeholder="votre@email.com" required autocomplete="email">
              </div>
              <div class="input-group">
                <label for="auth-password">Mot de passe</label>
                <input type="password" id="auth-password" placeholder="••••••••" required autocomplete="current-password">
                <button type="button" id="forgot-password-btn" class="text-btn-small">Mot de passe oublié ?</button>
              </div>
              <button type="submit" id="auth-submit-btn" class="cta-scan-btn">
                <span>Connexion</span>
              </button>
            </form>

          </div>
        </section>
      </main>

      <!-- Toast Container -->
      <div id="toast-container" class="ui-layer" aria-live="assertive"></div>
    </div>

    <script type="module">
      import { uiManager } from './js/components/ui-manager.js';
      import './js/authentification.js';
    </script>
  	<script type="module">import { uiManager } from './js/components/ui-manager.js';</script>
  </body>
</html>
