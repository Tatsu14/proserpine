<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Proserpine — Éco-Conseils</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="manifest" href="manifeste.json" />
    <meta name="theme-color" content="#071E12" />
  </head>
  <body>
    <div id="mobile-frame">
      <main id="app-content">
        <section id="view-tips" class="view active">
          <header class="app-header-dark">
            <div class="header-content">
              <div>
                <p class="greeting">L'astuce du jour</p>
                <h3>Eco-Conseils</h3>
              </div>
            </div>
          </header>
          <div class="scroll-content">
            <div class="tip-card-full">
              <div class="tip-icon-large">
                <span class="material-symbols-rounded">lightbulb</span>
              </div>
              <h4>Composter en ville</h4>
              <p>Le saviez-vous ? Même sans jardin, le compostage est possible grâce aux lombricomposteurs ou aux points de collecte municipaux à Liège.</p>
            </div>
            <p class="tip-card-footer">Plus de conseils à venir...</p>
          </div>
        </section>
      </main>

      <div id="navbar-placeholder"></div>
    </div>

    <script type="module">
      import { onAuthStateChanged } from "firebase/auth";
      import { auth } from './js/configuration-firebase.js';
      import { uiManager } from './js/components/ui-manager.js';
      
      onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = 'authentification.html';
      });
    </script>
  	<script type="module">import { uiManager } from './js/components/ui-manager.js';</script>
  </body>
</html>
