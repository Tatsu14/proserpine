<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proserpine — Redirection...</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/splash.css" />
  </head>
  <body class="splash-mode">
    <div class="loader-container">
      <div class="spinner"></div>
      <p>Chargement de Proserpine...</p>
    </div>

    <script type="module">
      import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
      import { auth } from './js/configuration-firebase.js';

      onAuthStateChanged(auth, (user) => {
        if (user) {
          window.location.href = 'accueil.html';
        } else {
          const hasAccount = localStorage.getItem('proserpine_has_account');
          if (hasAccount === 'true') {
            window.location.href = 'authentification.html?mode=login';
          } else {
            window.location.href = 'authentification.html';
          }
        }
      });
    </script>
  </body>
</html>
